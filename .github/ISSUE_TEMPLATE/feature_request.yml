name: Feature request
description: Propose an enhancement or new capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing an improvement.

  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What workflow pain point are you addressing?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: example
    attributes:
      label: Example usage
      description: CLI command or Python snippet
      placeholder: gptk temporal-composite --input-root ... --output-dir ...
